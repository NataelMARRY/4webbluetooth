<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="utf-8">

<title>Sciences de l'Ingénieur – JPO 2026</title>

<script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.1/dist/nipplejs.min.js"></script>

<style>

body{
    margin:0;
    background:linear-gradient(180deg,#0f172a,#020617);
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    text-align:center;
}

header{
    padding:30px;
}

h1{
    font-size:2.5em;
    margin:0;
}

h2{
    font-weight:normal;
    color:#60a5fa;
}

#connect{
    margin-top:20px;
    padding:12px 20px;
    font-size:1.2em;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

#connect:hover{
    background:#1d4ed8;
}

#zone{
    width:320px;
    height:320px;
    margin:60px auto;
    background:#111827;
    border-radius:50%;
    box-shadow:
        inset 0 0 40px rgba(0,0,0,0.7),
        0 0 40px rgba(59,130,246,0.4);
}

footer{
    margin-top:40px;
    opacity:0.7;
}

</style>
</head>


<body>

<header>

<h1>Sciences de l'Ingénieur</h1>
<h2>Journées Portes Ouvertes 2026</h2>

<button id="connect">Connexion à l'ESP32</button>

</header>


<div id="zone"></div>

<footer>
Contrôlez un anneau NeoPixel via Bluetooth Low Energy
</footer>


<script>

// =======================
// UUIDs
// =======================

const SERVICE_UUID = "c581f0d5-bda0-452c-9012-f4fda0042202";
const COLOR_UUID   = "c581f0d5-bda1-452c-9012-f4fda0042202";
const BRIGHT_UUID  = "c581f0d5-bda2-452c-9012-f4fda0042202";

let device;
let server;
let colorChar;
let brightChar;


// =======================
// Connexion BLE
// =======================

async function connect(){

device = await navigator.bluetooth.requestDevice({
    acceptAllDevices:true,
    optionalServices:[SERVICE_UUID]
});

server = await device.gatt.connect();

const service = await server.getPrimaryService(SERVICE_UUID);

colorChar  = await service.getCharacteristic(COLOR_UUID);
brightChar = await service.getCharacteristic(BRIGHT_UUID);

alert("ESP32 connecté");

}

document.getElementById("connect").onclick = connect;


// =======================
// Couleur aléatoire
// =======================

function randomColor(){

return [
Math.floor(Math.random()*255),
Math.floor(Math.random()*255),
Math.floor(Math.random()*255)
];

}


// =======================
// Conversion angle → LED
// =======================

function angleToLed(angle){

let index = Math.round(angle/30)%12;
return index;

}


// =======================
// Création joystick
// =======================

const joystick = nipplejs.create({

zone:document.getElementById("zone"),
mode:"static",
position:{left:"50%",top:"50%"},
color:"white"

});


// =======================
// Mouvement joystick
// =======================

joystick.on("move", async (evt,data)=>{

if(!colorChar || !brightChar) return;

let angle = data.angle.degree;
let force = Math.min(data.force,1);

let led = angleToLed(angle);

let [r,g,b] = randomColor();

let brightness = Math.floor(force*100);

// envoi LED + couleur
await colorChar.writeValue(
new Uint8Array([led,r,g])
);

// envoi luminosité
await brightChar.writeValue(
new Uint8Array([brightness])
);

});


// =======================
// Retour centre
// =======================

joystick.on("end", async ()=>{

if(!brightChar) return;

// luminosité 0 → animation ESP32
await brightChar.writeValue(
new Uint8Array([0])
);

});


</script>

</body>
</html>
